<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkadiusz Lisiecki</title>
    <link rel="stylesheet" href="styles/css/style.css">
    <script src="js/background-scene.js" defer></script>
    <script src="js/script.js" defer></script>
</head>

<body>
    <svg width="0" height="0" aria-hidden="true" focusable="false" style="position: absolute;">
        <symbol id="icon-cloud" viewBox="0 0 100 100">
            <path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                d="M31 69h36c10 0 18-6 18-17s-8-17-18-17h-2C61 22 51 14 38 14c-17 0-30 12-31 29C-2 46 5 69 31 69Z" />
        </symbol>
        <symbol id="icon-spiral" viewBox="0 0 100 100">
            <path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                d="M18 18h64v64H18V18Zm14 14h36v36H46V46h14" />
        </symbol>
        <symbol id="icon-project" viewBox="0 0 100 100">
            <path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                d="M25 20h34l16 16v44H25V20Zm34 0v16h16" />
        </symbol>
        <symbol id="icon-titanium" viewBox="0 0 100 100">
            <path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                d="M22 25h56M50 25v50m-14 0h28" />
        </symbol>
        <symbol id="icon-contact" viewBox="0 0 100 100">
            <path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                d="M22 28h56v30H40L22 72V28Z" />
        </symbol>
    </svg>

    <main class="page">
        <div class="background" aria-hidden="true" data-background-scene></div>

        <div class="lower-band" aria-hidden="true"></div>

        <a class="social" href="#" aria-label="Facebook">f</a>
        <h1 class="brand" aria-label="Arkadiusz Lisiecki">
            <span class="brand-word">arkadiusz lisiecki</span><sup class="brand-trademark">TM</sup>
        </h1>
        <p class="tagline">#Kod twojego biznesu</p>

        <section class="tiles" aria-label="Sekcje strony">
            <article class="tile tile--strategic project-slider" data-project-slider data-slider-interval="2400"
                aria-label="Moje prace front end developera">
                <span class="project-slider-status" aria-hidden="true">
                    <span class="project-slider-icon project-slider-icon--pause">
                        <span></span>
                        <span></span>
                    </span>
                </span>
                <p class="label project-slide is-active" data-project-slide
                    data-tile-bg="rgba(3, 105, 55, 0.62)" data-tile-hover-bg="rgba(28, 145, 82, 0.76)">
                    Landing page
                </p>
                <p class="label project-slide" data-project-slide data-tile-bg="rgba(36, 116, 132, 0.62)"
                    data-tile-hover-bg="rgba(55, 147, 164, 0.76)" aria-hidden="true">
                    Dashboard SaaS
                </p>
                <p class="label project-slide" data-project-slide data-tile-bg="rgba(42, 82, 156, 0.62)"
                    data-tile-hover-bg="rgba(64, 112, 198, 0.76)" aria-hidden="true">
                    Aplikacja React
                </p>
                <p class="label project-slide" data-project-slide data-tile-bg="rgba(180, 42, 92, 0.62)"
                    data-tile-hover-bg="rgba(218, 62, 122, 0.76)" aria-hidden="true">
                    Sklep e-commerce
                </p>
                <p class="label project-slide" data-project-slide data-tile-bg="rgba(166, 132, 28, 0.62)"
                    data-tile-hover-bg="rgba(204, 166, 42, 0.76)" aria-hidden="true">
                    Panel klienta
                </p>
            </article>

            <article class="tile tile--hosti">
                <img class="tile-icon" src="img/hosting.png" alt="" aria-hidden="true">
                <p class="label">Portfolio</p>
            </article>

            <article class="tile tile--tech">
                <img class="tile-icon" src="img/technology.png" alt="" aria-hidden="true">
                <p class="label">Stack</p>
            </article>

            <article class="tile tile--projects">
                <img class="tile-icon" src="img/realizations.png" alt="" aria-hidden="true">
                <p class="label">O mnie</p>
            </article>

            <article class="tile tile--titanium">
                <img class="tile-icon" src="img/titanium.png" alt="" aria-hidden="true">
                <p class="label">Najnowszy projekt</p>
            </article>

            <article class="tile tile--contact">
                <img class="tile-icon" src="img/contact.png" alt="" aria-hidden="true">
                <p class="label">Kontakt</p>
            </article>
        </section>
    </main>
</body>

</html>
